# GRPO configuration (Stage B RL)
model:
  # If you ran SFT before GRPO, set this to "AUTO_SFT" so GRPO starts
  # from the latest SFT checkpoint automatically.
  base_model: AUTO_SFT
  trust_remote_code: true
  use_flash_attention_2: true

lora:
  enabled: true
  r: 1
  alpha: 2
  dropout: 0.05
  target_modules: auto

training:
  output_dir: outputs/grpo
  seed: 55
  max_prompt_len: 1536
  max_completion_len: 512

  # 0 = run to completion (default). Set to a positive integer to stop after that many
  # optimizer steps. Useful for quick GRPO sanity checks.
  max_steps: 100

  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-5
  warmup_ratio: 0.03
  logging_steps: 10
  save_steps: 50
  save_first_step: true
  save_total_limit: 3
  bf16: true
  gradient_checkpointing: false

grpo:
  merge_base_if_peft: true
  # number of generations per prompt (exploration)
  num_generations: 6
  temperature: 0.9
  top_p: 0.95
  # KL / regularization strength; exact name depends on TRL version.
  beta: 0.05

reward:
  # weights for reward components (format-specific)
  # Reward uses deterministic parsers per output_type: JSON/YAML/TOML/XML/CSV.
  w_parse_json: 1.0
  w_only_json: 1.0
  w_parse_yaml: 1.0
  w_only_yaml: 1.0
  w_parse_toml: 1.0
  w_only_toml: 1.0
  w_parse_xml: 1.0
  w_only_xml: 1.0
  w_parse_csv: 1.0
  w_only_csv: 1.0

  # Gold match bonus (HF datasets without ATTRIBUTES benefit from this).
  # You can also override per format, e.g. w_match_toml.
  w_match: 1.0

  # Dense soft-match bonus (string-similarity on canonicalized structured output).
  # This avoids "reward collapse" where parse/only become constant early and GRPO
  # shows loss=0.0 with grad_norm=0.0. Keep >=0.5 for HF datasets.
  w_match_soft: 1.0

  # StructEval JSON tasks do not share a global schema, so we keep schema-based
  # components disabled by default.
  w_schema_valid: 0.0
  w_no_extra_keys: 0.0
  w_exact_authors_len_2: 0.0

  # penalties
  p_parse_fail: -3.0
  # Mild penalty when only best-effort parsing succeeds (mainly JSON).
  p_parse_best_effort: -1.5
  # Penalty when output is not format-only (e.g., extra text around the structure).
  p_only: -5.0

  # Additional penalty when the model emits wrapper text outside the extracted
  # structured payload (e.g., "Sure! ...", markdown fences, etc.).
  # You can override per format with p_extraneous_json / _yaml / _toml / _xml / _csv.
  p_extraneous: -5.0

  # --------------------------------------------------------------
  # YAML style shaping (beyond mere parse success)
  #
  # YAML can be syntactically valid while still violating our project's
  # canonical formatting rules (2-space indentation, block-style instead
  # of JSON-ish flow-style). These extra terms give GRPO a learning signal
  # to fix issues like "indent 2 spaces too much".
  # --------------------------------------------------------------
  w_yaml_indent_canonical: 0.5
  p_yaml_indent_canonical_fail: -2.0
  w_yaml_block_style: 0.2
  p_yaml_block_style_fail: -1.0

  # --------------------------------------------------------------
  # TOML canonical formatting shaping
  #
  # TOML outputs are normalized to a deterministic canonical form during HF import,
  # but during GRPO the model may still emit alternative (valid) styles.
  # This adds a *dense* shaping signal based on similarity to canonical TOML.
  # Prefer this over the cliff-like binary penalty.
  # --------------------------------------------------------------
  # Binary bonus (optional)
  w_toml_canonical: 0.1
  # Dense similarity bonus
  w_toml_canonical_soft: 0.5
  # Proportional penalty: penalize (1 - similarity)
  p_toml_canonical_soft_scale: -2.0
  # Legacy binary penalty (kept for compatibility; default off to avoid sparsity)
  p_toml_canonical_fail: 0.0

  # Legacy keys (kept for backward compatibility with older logs/configs)
  w_json_only: 1.0
  p_json_only_fail: -2.0

data:
  dataset_config: configs/dataset_hf_grpo.yaml

  # --------------------------------------------------------------
  # HF subset selection (NO data modification; selection only)
  #
  # mode:
  #   - balance_by_task: equalize by task_key (default)
  #   - per_output_type: choose counts per output format (e.g., TOML=all)
  #   - none: use the imported HF tasks as-is
  #
  # Note: legacy env vars (HF_BALANCE_*) still override balance_by_task.*
  # --------------------------------------------------------------
  sampling:
    #mode: balance_by_task
    mode: per_output_type

    balance_by_task:
      enabled: true
      strategy: min      # min|max|fixed
      fixed_n: null      # used when strategy=fixed
      seed: 55
      min_count: 8       # drop rare task_key groups before balancing

    # Example: train on all TOML tasks, and limit other formats.
    per_output_type:
      seed: 55
      shuffle: true
      oversample_with_replacement: false
      default_target: null
      targets:
        TOML: 0
        JSON: 0
        YAML: 0
        XML: 0
        CSV: 0

      # Optional: split per-format targets by HF family (u10bei / daichira / other).
      by_task_family:
        enabled: true
        default_family: other
        families:
          u10bei:
            targets:
              TOML: 100
              JSON: 10
              YAML: 10
              XML: 10
              CSV: 10
          daichira:
            targets:
              TOML: 0
          other:
            targets:
              TOML: 0

  # Optional: append local StructEval-style task JSON arrays AFTER HF balancing & split.
  # Useful when HF datasets lack certain patterns (e.g., TOML inline tables).
  use_extra_datasets: false

  # List of local dataset files (JSON arrays). Each file is split into train/valid and
  # appended to `data/train_hf_grpo_tasks.json` and `data/valid_hf_grpo_tasks.json`.
  extra_datasets:
    - data/my_grpo_dataset.json

  extra_split:
    valid_ratio: 0.1
    seed: 55

  # Optional: keep config parity with SFT. (Currently only applied for stage=sft.)
  extra_filters:
    toml_min_depth: null

eval:
  run_eval_after_train: false
  eval_config: configs/eval.yaml
  post_train_eval_mode: exec
