# Simple random-search space for `python train.py tune`
sampling:
  seed: 123

params:
  training.learning_rate:
    type: log_uniform
    low: 1e-6
    high: 5e-4

  training.num_train_epochs:
    type: choice
    values: [1, 2, 3]

  lora.r:
    type: choice
    values: [8, 16, 32]

  lora.dropout:
    type: uniform
    low: 0.0
    high: 0.1
