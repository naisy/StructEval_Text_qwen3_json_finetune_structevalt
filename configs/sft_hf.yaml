# SFT configuration (Stage A)
model:
  base_model: Qwen/Qwen3-4B-Instruct-2507
  # If you are using Unsloth or a local path, set base_model to that path.
  trust_remote_code: true
  use_flash_attention_2: true

lora:
  enabled: true
  r: 1
  alpha: 2
  dropout: 0.05
  # YAML/TOMLの 表記ミス が主問題なら：MLPのみに絞る実験
  #target_modules: ["gate_proj","up_proj","down_proj"]
  # 逆に 抽出/変換での取り違え が主問題なら：Attentionのみに絞る実験
  #target_modules: ["q_proj","k_proj","v_proj","o_proj"]
  target_modules: auto  # "auto" uses a heuristic list in src/models/lora.py

training:
  merge_lora_before_save: true
  output_dir: outputs/sft
  seed: 42
  max_seq_len: 1024
  # Memory stabilization: pad all sequences to max_seq_len to avoid gradual CUDA cache growth
  pad_to_max_length: true
  # Disable kv-cache during training (saves memory; no effect on eval/generation)
  disable_cache: true
  # Train loss only on assistant/completion tokens (prompt tokens get labels=-100)
  assistant_only_loss: true
  # Optionally reduce activation memory at the cost of speed
  gradient_checkpointing: false
  # If VRAM still creeps up, set >0 to call torch.cuda.empty_cache() every N steps
  torch_empty_cache_steps: 0
  # If you want to reduce padding (can increase peak VRAM), set true
  group_by_length: false
  dataloader_num_workers: 0
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  num_train_epochs: 2
  learning_rate: 5.25e-5
  warmup_ratio: 0.05
  weight_decay: 0.0
  logging_steps: 10
  eval_steps: 200
  save_steps: 50
  save_first_step: true
  save_total_limit: 3
  bf16: true
  fp16: false
  # Logging integration for Hugging Face Trainer.
  # Set to "wandb" to enable Weights & Biases logging.
  report_to: none

data:
  dataset_config: configs/dataset_hf_sft.yaml

  # --------------------------------------------------------------
  # Dataset sources
  #
  # This project supports two mutually-exclusive ways to provide
  # training data:
  #   - online_dataset: download HF datasets, then run local validation
  #     and task-family balancing / sampling.
  #   - offline_dataset: use already-prepared local datasets (jsonl),
  #     without downloading or modifying data.
  #
  # NOTE: The official contest rule is:
  #   - If you train with the provided HF datasets, you MUST NOT mix
  #     in synthetic/local data.
  # Therefore, in typical contest runs you should set exactly one of
  # (online_dataset.use, offline_dataset.use) to true.
  # --------------------------------------------------------------
  online_dataset:
    use: true

    # HF datasets to download.
    # - null: use the default list in scripts/run_sft_hf.sh (and/or env overrides)
    # - list: override from config (recommended for reproducibility)
    datasets: null
    # HF split name (usually: train).
    split: train

    # Import-time validation
    # - filter_invalid: drop examples whose target structure is invalid
    # - shuffle_seed: deterministic shuffle during HF import
    import:
      filter_invalid: true
      shuffle_seed: 42

    # Optional preprocessing filters applied to the imported HF JSONL.
    # Currently only used for auxiliary steps (e.g., deep TOML extraction).
    filters:
      # null => disable depth filtering
      toml_min_depth: null

    # Subset selection (sampling/balancing) applied AFTER HF import.
    sampling: &SFT_SAMPLING
      # mode:
      #   - balance_by_task: equalize by task_key (default)
      #   - per_output_type: choose counts per output format (e.g., TOML=all)
      #   - none: use the imported dataset as-is
      mode: balance_by_task
      #mode: per_output_type

      balance_by_task:
        enabled: true
        strategy: min      # min|max|fixed
        fixed_n: null      # used when strategy=fixed
        seed: 42
        min_count: 8       # drop rare task_key groups before balancing

      # Example: train on all TOML, and limit other formats.
      per_output_type:
        seed: 42
        shuffle: true
        oversample_with_replacement: false
        default_target: null   # null => keep all for unspecified formats
        targets:
          TOML: 0
          JSON: 0
          YAML: 0
          XML: 0
          CSV: 0

        # Optional: split per-format targets by HF family.
        # Useful when only one family contains a hard pattern.
        by_task_family:
          enabled: true
          default_family: other   # used when task_family is missing or unknown
          families:
            u10bei:
              targets:
                TOML: 200
                JSON: 100
                YAML: 100
                XML: 100
                CSV: 100
            daichira:
              targets:
                TOML: 0
                JSON: 0
                YAML: 0
                XML: 0
                CSV: 0
            other:
              targets:
                TOML: 0
                JSON: 0
                YAML: 0
                XML: 0
                CSV: 0

  offline_dataset:
    use: false

    # Local dataset files or directories.
    # - file: a single *.jsonl file
    # - dir:  a directory; all *.jsonl under it are collected (recursive)
    datasets: []

    # How to split offline data into train/valid.
    split:
      valid_ratio: 0.1
      seed: 42

    # Optional preprocessing filters applied to offline JSONL.
    filters:
      # null => disable depth filtering
      toml_min_depth: null

    # Offline data can be sampled/balanced using the SAME logic.
    # When offline_dataset.use=true, this block is used by default.
    sampling: *SFT_SAMPLING

eval:
  # quick validation after SFT
  run_eval_after_train: false
  eval_config: configs/eval.yaml
  post_train_eval_mode: exec
